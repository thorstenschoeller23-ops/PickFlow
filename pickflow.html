<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PickFlow – Lager &amp; Logistik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@100..125,500..900&family=Instrument+Sans:wght@400..700&family=JetBrains+Mono:wght@400..800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   PICKFLOW 2.0 – frisches, weiches, freundliches Design.
   Farben laufen über CSS-Variablen, die live umgestellt werden
   können (Marken-Anpassung in der Verwaltung).
   ============================================================ */
:root{
  /* Diese vier setzt applyTheme() live: */
  --primary:#2B3FE4; --violet:#7C3AED;
  --grad:linear-gradient(125deg,#2B3FE4,#7C3AED);
  --primary-soft:#EEF1FE;
  /* Neutralflächen */
  --bg:#F6F7FC; --surface:#FFFFFF; --tint:#F1F4FE; --line:#E6E9F5;
  --text:#0E1330; --text2:#5A6180;
  /* Semantische Statusfarben (bleiben fix) */
  --red:#E8401C; --red-bg:#FFECE6; --amber:#8A5B00; --amber-bg:#FFF3D6; --green:#0B7A4F; --green-bg:#DCF5E9;
  --radius:20px; --radius-sm:14px;
  --shadow:0 4px 18px rgba(20,26,60,.06), 0 1px 3px rgba(20,26,60,.05);
  --shadow-lg:0 20px 50px rgba(20,26,60,.16);
  --pad:22px;
  --font-head:"Archivo",sans-serif; --font-body:"Instrument Sans",sans-serif; --font-mono:"JetBrains Mono",monospace;
}
/* Kompakter Modus (umschaltbar) */
body[data-density="kompakt"]{--pad:14px;--radius:15px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;-webkit-tap-highlight-color:transparent}
body{background-image:radial-gradient(1200px 600px at 100% -10%,var(--primary-soft),transparent 60%)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
h1,h2,h3,h4{font-family:var(--font-head);font-stretch:105%;letter-spacing:-.01em;line-height:1.15}
.mono{font-family:var(--font-mono)}
::selection{background:var(--primary);color:#fff}

/* ---------- Demo-Hinweis ---------- */
.demo-bar{background:var(--surface);border-bottom:1px solid var(--line);color:var(--text2);
  text-align:center;font-size:12px;padding:5px 12px}
.demo-bar .mono{font-size:11px;color:var(--primary)}

/* ---------- App-Leiste ---------- */
.appbar{display:flex;align-items:center;gap:16px;padding:11px 22px;
  background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(14px);
  border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:11px}
.logo-dot{width:30px;height:30px;border-radius:9px;background:var(--grad);
  box-shadow:0 6px 16px rgba(43,63,228,.3);position:relative;flex-shrink:0}
.logo-dot::after{content:"";position:absolute;inset:8px;border-radius:4px;background:rgba(255,255,255,.9)}
.logo-name{font-family:var(--font-head);font-weight:800;font-stretch:110%;letter-spacing:.02em;font-size:19px}
.role-tabs{display:flex;gap:4px;background:var(--tint);padding:5px;border-radius:16px;border:1px solid var(--line)}
.role-tab{border-radius:12px;padding:7px 16px;text-align:center;color:var(--text2);transition:all .2s;white-space:nowrap}
.role-tab .rt-name{font-family:var(--font-head);font-weight:700;font-size:12.5px;letter-spacing:.02em;display:block}
.role-tab .rt-dev{font-family:var(--font-mono);font-size:9px;display:block;margin-top:1px;opacity:.7}
.role-tab.active{background:var(--surface);color:var(--primary);box-shadow:0 3px 10px rgba(20,26,60,.12)}
.appbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.gear-btn{width:42px;height:42px;border-radius:13px;background:var(--surface);border:1px solid var(--line);
  font-size:19px;display:flex;align-items:center;justify-content:center;transition:.2s;box-shadow:var(--shadow)}
.gear-btn:active{transform:scale(.94)}
.gear-btn.active{background:var(--grad);color:#fff;border-color:transparent}
.clock{font-family:var(--font-mono);font-weight:700;font-size:17px;
  background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:5px 13px;text-align:center}
.clock small{font-weight:600;font-size:9px;color:var(--primary);display:block;line-height:1;letter-spacing:.1em;text-transform:uppercase}

/* ---------- Bausteine ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.pill{border-radius:999px;padding:10px 20px;font-weight:700;font-family:var(--font-head);
  font-size:13.5px;letter-spacing:.01em;transition:transform .12s,box-shadow .2s;display:inline-flex;align-items:center;gap:6px}
.pill:active{transform:scale(.96)}
.pill-primary{background:var(--grad);color:#fff;box-shadow:0 6px 18px rgba(43,63,228,.32)}
.pill-ghost{background:var(--tint);color:var(--primary);border:1px solid var(--line)}
.pill-green{background:var(--green);color:#fff}
.pill:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:10.5px;font-weight:700;
  border-radius:999px;padding:4px 10px;letter-spacing:.01em}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-blue{background:var(--primary-soft);color:var(--primary)}
.progress{height:8px;background:var(--tint);border-radius:99px;overflow:hidden}
.progress > i{display:block;height:100%;background:var(--grad);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.progress.done > i{background:var(--green)}
.section-title{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text2);margin-bottom:11px;font-family:var(--font-head)}
.empty{padding:34px 18px;text-align:center;color:var(--text2);font-size:14px;background:var(--tint);
  border:1.5px dashed var(--line);border-radius:var(--radius)}
.empty b{display:block;font-size:30px;margin-bottom:8px}
select.mini,.inp-mini{border:1.5px solid var(--line);background:var(--surface);border-radius:10px;
  font-size:12.5px;padding:7px 9px;color:var(--text);max-width:150px}

@keyframes pulseGlow{0%{box-shadow:0 0 0 0 rgba(43,63,228,.4)}70%{box-shadow:0 0 0 12px rgba(43,63,228,0)}100%{box-shadow:0 0 0 0 rgba(43,63,228,0)}}
.pulse{animation:pulseGlow 1.6s ease-out 2}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.slide-in{animation:slideIn .4s cubic-bezier(.4,0,.2,1) both}
@keyframes flyOut{to{opacity:0;transform:translateX(40px) scale(.9);max-height:0;margin:0;padding:0;border-width:0}}
.fly-out{animation:flyOut .5s ease forwards;overflow:hidden}
@keyframes greenFlash{0%{background:var(--green-bg)}100%{background:var(--surface)}}
.flash-green{animation:greenFlash 1s ease}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- Willkommens-/Info-Banner ---------- */
.welcome{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 18px;margin-bottom:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.welcome::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--grad)}
.welcome h2{font-size:17px;margin-bottom:3px}
.welcome p{font-size:13.5px;color:var(--text2);line-height:1.5}
.welcome .wc-close{position:absolute;top:12px;right:14px;font-size:18px;color:var(--text2);
  width:30px;height:30px;border-radius:9px}
.welcome .wc-close:active{background:var(--tint)}
.role-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.role-legend button{display:flex;align-items:center;gap:7px;background:var(--tint);border:1px solid var(--line);
  border-radius:12px;padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--text);transition:.15s}
.role-legend button:active{transform:scale(.97)}
.role-legend .rl-ico{font-size:16px}

/* ============================================================
   A) LEITSTAND
   ============================================================ */
.view{padding:var(--pad) 22px 70px;max-width:1500px;margin:0 auto}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:13px;margin-bottom:16px}
.kpi{padding:16px 18px;position:relative;overflow:hidden}
.kpi .kpi-label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);
  font-family:var(--font-head);font-weight:700}
.kpi .kpi-value{font-family:var(--font-mono);font-weight:800;font-size:30px;margin-top:5px;line-height:1.05}
.kpi .kpi-sub{font-size:12px;color:var(--text2);margin-top:3px}
.kpi.kpi-alert{background:var(--red-bg);border-color:transparent}
.kpi.kpi-alert .kpi-value{color:var(--red)}
.kpi.kpi-good .kpi-value{color:var(--green)}

.leit-grid{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start}
@media(max-width:1100px){.leit-grid{grid-template-columns:1fr}}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:900px){.board{grid-template-columns:repeat(2,1fr)}}
.board-col{background:var(--tint);border:1px solid var(--line);border-radius:var(--radius);padding:11px;min-height:120px}
.board-col-head{display:flex;justify-content:space-between;align-items:center;padding:3px 6px 11px}
.board-col-head h3{font-size:11.5px;letter-spacing:.06em;font-weight:800;color:var(--text2)}
.board-col-head .count{font-family:var(--font-mono);font-size:11px;background:var(--surface);
  border:1px solid var(--line);border-radius:99px;padding:2px 9px;font-weight:700}
.order-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:13px;margin-bottom:10px;box-shadow:0 2px 8px rgba(20,26,60,.05);transition:transform .15s,box-shadow .2s}
.order-card:hover{box-shadow:0 8px 20px rgba(20,26,60,.1)}
.order-card.crit{border-color:var(--red);box-shadow:0 0 0 2px var(--red-bg)}
.order-card.teil{border-color:#EBC66B}
.order-card .oc-top{display:flex;justify-content:space-between;align-items:center;gap:6px}
.order-card .oc-id{font-family:var(--font-mono);font-weight:800;font-size:15px}
.order-card .oc-kunde{font-size:13px;color:var(--text2);margin:4px 0 9px;font-weight:500}
.order-card .oc-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;align-items:center}
.order-card .oc-prog{display:flex;align-items:center;gap:9px;margin-top:9px}
.order-card .oc-prog .mono{font-size:11px;font-weight:700;white-space:nowrap;color:var(--text2)}
.order-card .oc-actions{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap}

.side-stack > .card{padding:16px;margin-bottom:14px}
.picker-row{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
.picker-row:last-child{border-bottom:none;padding-bottom:0}
.avatar{width:38px;height:38px;border-radius:12px;background:var(--grad);color:#fff;display:flex;
  align-items:center;justify-content:center;font-family:var(--font-head);font-weight:800;font-size:13px;flex-shrink:0;
  box-shadow:0 4px 10px rgba(43,63,228,.25)}
.picker-row .pr-info{flex:1;min-width:0}
.picker-row .pr-name{font-weight:700;font-size:14px}
.picker-row .pr-sub{font-size:11.5px;color:var(--text2);margin-top:1px}
.warn-item{display:flex;gap:10px;align-items:flex-start;padding:11px;border-radius:var(--radius-sm);margin-bottom:8px;font-size:12.5px}
.warn-item .w-ico{font-size:16px;line-height:1.1}
.warn-item .w-txt{flex:1;line-height:1.35}
.warn-item .w-time{font-family:var(--font-mono);font-size:10px;opacity:.7;display:block;margin-top:2px}
.warn-item.w-red{background:var(--red-bg);color:var(--red)}
.warn-item.w-amber{background:var(--amber-bg);color:var(--amber)}
.warn-item button{font-size:11px;font-weight:800;border-radius:9px;padding:4px 9px;
  background:rgba(255,255,255,.75);color:inherit;flex-shrink:0}
.log-feed{max-height:290px;overflow-y:auto;margin:-4px}
.log-item{display:flex;gap:9px;padding:7px 4px;border-bottom:1px dashed var(--line);font-size:12.5px;line-height:1.35}
.log-item:last-child{border-bottom:none}
.log-item .mono{color:var(--primary);font-size:11px;flex-shrink:0;padding-top:1px;font-weight:600}

/* ============================================================
   B) PICKER (Geräte-Attrappe)
   ============================================================ */
.device-wrap{display:flex;justify-content:center;padding-top:6px}
.device{width:100%;max-width:430px;background:#0D0F1A;border-radius:44px;padding:14px 12px 20px;
  box-shadow:var(--shadow-lg),0 0 0 2px rgba(255,255,255,.04) inset}
.device-notch{width:120px;height:6px;border-radius:99px;background:#2a2e40;margin:0 auto 12px}
.screen{background:var(--bg);border-radius:32px;overflow:hidden;min-height:670px;display:flex;flex-direction:column;position:relative}
.pk-head{background:var(--surface);border-bottom:1px solid var(--line);padding:12px 15px}
.pk-head .pk-user{display:flex;align-items:center;gap:10px}
.pk-head .pk-stats{font-family:var(--font-mono);font-size:11px;color:var(--text2)}
.pk-body{flex:1;padding:15px;display:flex;flex-direction:column;gap:13px;overflow-y:auto}
.pk-order-item{width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);padding:15px;display:block;box-shadow:var(--shadow);transition:transform .12s}
.pk-order-item:active{transform:scale(.98)}
.pk-order-item .oi-row{display:flex;justify-content:space-between;align-items:center}
.pk-order-item .oi-id{font-family:var(--font-mono);font-weight:800;font-size:17px}
.pk-order-item .oi-sub{font-size:12.5px;color:var(--text2);margin-top:4px}
.pk-order-item .oi-cut{font-family:var(--font-mono);font-size:11.5px;font-weight:700;margin-top:7px}
.loc-code{font-family:var(--font-mono);font-weight:800;text-align:center;
  font-size:clamp(46px,14vw,62px);letter-spacing:-.02em;line-height:1.02;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.loc-sub{display:flex;justify-content:center;gap:7px;margin-top:8px;flex-wrap:wrap}
.pk-art{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;text-align:center;box-shadow:var(--shadow)}
.pk-art .art-emoji{font-size:46px;line-height:1;width:84px;height:84px;border-radius:24px;
  background:var(--tint);display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px}
.pk-art .art-name{font-family:var(--font-head);font-weight:800;font-size:20px}
.pk-art .art-nr{font-family:var(--font-mono);font-size:13px;color:var(--text2);margin-top:3px}
.pk-qty{font-family:var(--font-mono);font-weight:800;font-size:56px;margin-top:8px;line-height:1;color:var(--primary)}
.pk-qty small{font-size:20px;color:var(--text2);font-weight:600}
.scan-box{display:flex;gap:8px}
.scan-box input{flex:1;border:2px solid var(--line);border-radius:var(--radius-sm);padding:14px;
  font-family:var(--font-mono);font-size:18px;font-weight:700;background:var(--surface);color:var(--text)}
.scan-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
.btn-big{width:100%;border-radius:var(--radius-sm);padding:17px;font-family:var(--font-head);font-weight:800;
  font-size:16px;letter-spacing:.01em;transition:transform .12s}
.btn-big:active{transform:scale(.98)}
.btn-scan{background:var(--grad);color:#fff;box-shadow:0 8px 20px rgba(43,63,228,.35)}
.btn-problem{background:var(--surface);color:var(--red);border:1.5px solid var(--red-bg);font-size:13.5px;padding:13px}
.stepper{display:flex;align-items:center;justify-content:center;gap:16px}
.stepper button{width:68px;height:68px;border-radius:22px;background:var(--tint);border:1px solid var(--line);
  font-size:32px;font-weight:800;color:var(--primary);transition:transform .1s}
.stepper button:active{transform:scale(.92)}
.stepper .st-val{font-family:var(--font-mono);font-weight:800;font-size:50px;min-width:90px;text-align:center}
.pk-progress{padding:12px 15px;background:var(--surface);border-top:1px solid var(--line)}
.pk-progress .mono{font-size:11px;font-weight:700;color:var(--text2)}
.teil-hint{font-size:12.5px;color:var(--amber);background:var(--amber-bg);border-radius:12px;padding:9px 12px;text-align:center;font-weight:600}
.overlay-wrong{position:absolute;inset:0;background:var(--red);color:#fff;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;
  padding:26px;text-align:center;border-radius:32px;animation:slideIn .2s ease}
.overlay-wrong .ow-ico{font-size:60px}
.overlay-wrong h2{font-size:27px;font-weight:900}
.overlay-wrong .ow-codes{font-family:var(--font-mono);font-size:15px;background:rgba(255,255,255,.16);
  border-radius:16px;padding:14px 18px;line-height:1.8}
.overlay-wrong button{background:#fff;color:var(--red);border-radius:999px;padding:14px 36px;
  font-family:var(--font-head);font-weight:800;font-size:15px}

/* ---------- Modal ---------- */
.modal-back{position:fixed;inset:0;background:rgba(14,19,48,.5);backdrop-filter:blur(4px);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;animation:slideIn .2s ease}
.modal{background:var(--surface);border-radius:24px;padding:22px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);
  max-height:90vh;overflow-y:auto}
.modal h3{font-size:19px;margin-bottom:4px}
.modal p{font-size:13px;color:var(--text2);margin-bottom:15px;line-height:1.45}
.modal .prob-btn{width:100%;text-align:left;border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:14px;margin-bottom:9px;background:var(--tint);font-weight:700;font-size:14px;transition:.15s}
.modal .prob-btn:active{transform:scale(.98)}
.modal .cancel{width:100%;padding:13px;color:var(--text2);font-weight:700;margin-top:2px}
.confirm-txt{font-size:14.5px;line-height:1.5;margin-bottom:18px}
.btn-danger-big{width:100%;border-radius:var(--radius-sm);padding:15px;font-family:var(--font-head);
  font-weight:800;font-size:15px;background:var(--red);color:#fff}

/* ---------- Zusammenfassung ---------- */
.summary-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:24px;text-align:center;box-shadow:var(--shadow)}
.summary-card .sc-ico{font-size:50px}
.summary-card h2{font-size:22px;margin:10px 0 16px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:18px}
.summary-grid .sg{background:var(--tint);border-radius:var(--radius-sm);padding:12px 6px}
.summary-grid .sg b{font-family:var(--font-mono);font-size:22px;display:block}
.summary-grid .sg span{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}

/* ============================================================
   C) PACKPLATZ
   ============================================================ */
.pack-view{max-width:1000px;margin:0 auto}
.pack-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
@media(max-width:840px){.pack-grid{grid-template-columns:1fr}}
.pack-card{padding:17px;margin-bottom:14px}
.pack-card .pc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px;flex-wrap:wrap}
.pack-card .pc-id{font-family:var(--font-mono);font-weight:800;font-size:17px}
.pack-card .pc-kunde{font-size:13px;color:var(--text2);margin-bottom:12px}
.check-row{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;
  border:1px solid var(--line);margin-bottom:7px;background:var(--surface);cursor:pointer;user-select:none;transition:.15s}
.check-row.checked{background:var(--green-bg);border-color:var(--green)}
.check-row .cb{width:26px;height:26px;border-radius:9px;border:2px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:14px;background:var(--surface);transition:.15s}
.check-row.checked .cb{background:var(--green);border-color:var(--green)}
.check-row .cr-name{flex:1;font-size:13.5px;font-weight:600}
.check-row .cr-qty{font-family:var(--font-mono);font-weight:800;font-size:14px}
.check-row .cr-teil{font-size:10.5px}
.pack-select{display:flex;gap:7px;margin:14px 0;flex-wrap:wrap}
.pack-select button{border:1.5px solid var(--line);border-radius:999px;padding:9px 16px;
  font-weight:700;font-size:12.5px;background:var(--surface);color:var(--text2);transition:.15s}

<div class="demo-bar">Demo-Modus – alle Daten sind Beispieldaten · <span class="mono">In-Memory, kein Server</span></div>

    <button class="role-tab" data-role="picker" data-onclick="setRole('picker')">
      <span class="rt-name">PICKER</span><span class="rt-dev">Handscanner</span></button>

<script>
/* ============================================================
   PICKFLOW – Anwendungslogik
   Gemeinsamer In-Memory-State, alle Ansichten rendern daraus.
   ============================================================ */
"use strict";

/* ---------- Hilfsfunktionen ---------- */
const $ = s => document.querySelector(s);
const pad = n => String(n).padStart(2, "0");
const fmtTime = d => pad(d.getHours()) + ":" + pad(d.getMinutes());
const fmtTimeS = d => fmtTime(d) + ":" + pad(d.getSeconds());
const inMin = m => new Date(Date.now() + m * 60000);          // Zeitpunkt in m Minuten
const agoMin = m => new Date(Date.now() - m * 60000);          // Zeitpunkt vor m Minuten
function fmtCountdown(ms) {                                    // Restzeit menschenlesbar
  if (ms <= 0) return "00:00";
  const s = Math.floor(ms / 1000);
  if (s >= 3600) return Math.floor(s / 3600) + "h " + pad(Math.floor((s % 3600) / 60)) + "m";
  return pad(Math.floor(s / 60)) + ":" + pad(s % 60);
}
function locCode(lp) { return "G" + pad(lp.gang) + "-R" + pad(lp.regal) + "-B" + lp.boden; }
function esc(t) { return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

const PRIO_LABEL = { normal:"Normal", eilig:"Eilig", express:"⚡ Express" };
const SHIFT_START = agoMin(240); // Schichtbeginn vor 4 h (für Picks/Stunde)

/* ============================================================
   BETRIEBS-KONFIGURATION – alles unter "Verwaltung" einstellbar
   ============================================================ */
const config = {
  firma: "PICKFLOW",             // Anzeigename in der App-Leiste
  theme: "kobalt",               // Aktives Farbschema (siehe THEMES)
  customColor: "#2B3FE4",        // Eigene Markenfarbe (wenn theme === "custom")
  density: "komfort",            // "komfort" oder "kompakt"
  showLog: true,                 // Ereignis-Log im Leitstand anzeigen?
  showWelcome: true,             // Willkommens-Banner anzeigen?
  avgPickSec: 50,                // Ø-Zeit pro Pick (Cut-off-Risikoformel)
  versandPufferMin: 16,          // Puffer für Kontrolle + Packen + Verladen
  abfahrtWarnMin: 15,            // KPI "Nächste Abfahrt" färbt sich rot ab dieser Restzeit
  zielGenauigkeit: 99.0,         // Ziel-Pick-Genauigkeit in % (KPI-Ampel)
  ueberpicken: false,            // Darf mehr als die Soll-Menge bestätigt werden?
  scanSimButton: true,           // "SCAN SIMULIEREN"-Button in der Picker-Ansicht
  routeMode: "schlange",         // "schlange" (Serpentine) oder "linear" (Gang+Regal aufsteigend)
  kontrollzaehlung: true,        // Packplatz: Positionen müssen abgehakt werden
  kategorien: [
    { name:"Werkzeug", emoji:"🔧" }, { name:"Elektro", emoji:"🔌" },
    { name:"Sanitär", emoji:"🚿" }, { name:"Befestigung", emoji:"🔩" },
    { name:"Farben", emoji:"🎨" },
  ],
  packstuecke: ["Karton S","Karton M","Karton L","Palette"],
};
function katEmoji(name) { const k = config.kategorien.find(k => k.name === name); return k ? k.emoji : "📦"; }

/* ============================================================
   MARKEN-THEMES – live umschaltbar (setzt CSS-Variablen)
   ============================================================ */
const THEMES = {
  kobalt: { name:"Kobalt",  a:"#2B3FE4", b:"#7C3AED" },
  ozean:  { name:"Ozean",   a:"#0EA5E9", b:"#2563EB" },
  wald:   { name:"Wald",    a:"#0D9488", b:"#059669" },
  sonne:  { name:"Sonne",   a:"#F59E0B", b:"#EA580C" },
  beere:  { name:"Beere",   a:"#DB2777", b:"#7C3AED" },
  graphit:{ name:"Graphit", a:"#475569", b:"#1E293B" },
};
function hexToRgb(h){ h=h.replace("#",""); if(h.length===3)h=h.split("").map(c=>c+c).join(""); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
function mix(h, target, t){ const a=hexToRgb(h),b=hexToRgb(target); return "#"+a.map((v,i)=>Math.round(v+(b[i]-v)*t).toString(16).padStart(2,"0")).join(""); }
function applyTheme() {
  let a, b;
  if (config.theme === "custom") { a = config.customColor; b = mix(a, "#000000", 0.22); }
  else { const t = THEMES[config.theme] || THEMES.kobalt; a = t.a; b = t.b; }
  const r = document.documentElement.style;
  r.setProperty("--primary", a);
  r.setProperty("--violet", b);
  r.setProperty("--grad", "linear-gradient(125deg," + a + "," + b + ")");
  r.setProperty("--primary-soft", mix(a, "#FFFFFF", 0.9));   // sehr helle Tönung für Chips/Fokus
  document.body.setAttribute("data-density", config.density);
}


/* ============================================================
   ZUGÄNGE & BERECHTIGUNGEN (wie im Restaurant-Projekt):
   Jedes Konto meldet sich mit Benutzername + Passwort an und
   sieht NUR die Ansichten, die seine Berechtigungen erlauben.
   Die Leitung sieht alles; ein Picker sieht nur seine
   Pick-Ansicht. Konten sind unter Verwaltung → Zugänge frei
   anleg- und änderbar (Demo: im Arbeitsspeicher, Passwörter
   im Klartext – in einer echten App über sichere Anmeldung).
   ============================================================ */
const FEATURES = [
  { id:"leitstand", label:"Leitstand",  ico:"🖥️", desc:"Überblick, Zuweisung, Warnungen" },
  { id:"picker",    label:"Picker",     ico:"📱", desc:"Geführtes Kommissionieren" },
  { id:"packplatz", label:"Packplatz",  ico:"📦", desc:"Kontrollieren, Packen, Verladen" },
  { id:"admin",     label:"Verwaltung", ico:"⚙️", desc:"Stammdaten & Einstellungen" },
];
const accounts = [
  { id:"acc1", user:"chef",  pass:"1234", name:"Chef (Leitung)", pickerId:null, perms:["leitstand","picker","packplatz","admin"] },
  { id:"acc2", user:"lena",  pass:"1234", name:"Lena K.",        pickerId:"p1", perms:["picker"] },
  { id:"acc3", user:"ahmed", pass:"1234", name:"Ahmed B.",       pickerId:"p2", perms:["picker"] },
  { id:"acc4", user:"demo",  pass:"1234", name:"Du (Demo)",      pickerId:"p3", perms:["picker"] },
  { id:"acc5", user:"pack",  pass:"1234", name:"Packplatz-Tablet", pickerId:null, perms:["packplatz"] },
];
function currentPerms() { return state.currentUser ? state.currentUser.perms : []; }
function hasPerm(f) { return currentPerms().includes(f); }
function adminCount() { return accounts.filter(a => a.perms.includes("admin")).length; }

/* ============================================================
   DEMO-DATEN
   ============================================================ */
/* --- Artikel: 28 Stück über 6 Gänge, 3 bewusst unter Mindestbestand --- */
function A(id, nr, name, kat, g, r, b, bestand, mind, gewicht) {
  return { id, artikelnummer: nr, name, kategorie: kat,
           lagerplatz: { gang: g, regal: r, boden: b }, bestand, mindestbestand: mind, gewicht };
}
const artikel = [

/* Laufoptimierte Reihenfolge: Gang aufsteigend, Schlangenlogik –
   ungerade Gänge Regal aufsteigend, gerade Gänge Regal absteigend. */
function routeSort(posIdx, order) {
  return posIdx.slice().sort((i, j) => {
    const A = artById[order.positionen[i].artikelId].lagerplatz;
    const B = artById[order.positionen[j].artikelId].lagerplatz;
    if (A.gang !== B.gang) return A.gang - B.gang;
    /* "schlange": ungerade Gänge aufwärts, gerade abwärts · "linear": immer aufwärts */
    const dir = (config.routeMode === "schlange" && A.gang % 2 === 0) ? -1 : 1;
    if (A.regal !== B.regal) return (A.regal - B.regal) * dir;
    return A.boden - B.boden;
  });
}
function doneCount(o) { return o.positionen.filter(p => p.status === "gepickt" || p.status === "teilpick").length; }
function openCount(o) { return o.positionen.filter(p => p.status === "offen").length; }
function hasTeilpick(o) { return o.positionen.some(p => p.status === "teilpick" || p.status === "problem"); }
function accuracy() { return state.scansTotal ? (state.scansOk / state.scansTotal * 100) : 100; }
function pickerAcc(p) {
  const tot = p.picksHeute + p.fehlerHeute;
  return tot ? (p.picksHeute / tot * 100).toFixed(1) : "100.0";
}
function picksPerHour() {
  const h = (Date.now() - SHIFT_START.getTime()) / 3600000;
  const total = pickers.reduce((s, p) => s + p.picksHeute, 0);
  return Math.round(total / h);
}
function nextTour() { return touren.filter(t => t.abfahrt > new Date()).sort((a,b)=>a.abfahrt-b.abfahrt)[0] || null; }
/* Cut-off-Risiko: verbleibende Positionen × Ø-Zeit pro Pick (+ Puffer für
   Packen & Verladen, denn der Auftrag muss zum Cut-off AUF dem LKW sein)
   > Zeit bis Cut-off  →  Warnung */
function isCritical(o) {
  if (o.status !== "offen" && o.status !== "inKommissionierung") return false;
  const restMs = o.cutoff - new Date();
  if (restMs <= 0) return true;
  return openCount(o) * config.avgPickSec * 1000 + config.versandPufferMin * 60000 > restMs;
}
function checkCriticals() {
  let changed = false;
  for (const o of orders) {
    const crit = isCritical(o);
    if (crit && !state.critical.has(o.id)) {
      state.critical.add(o.id); changed = true;
      addWarning("red","⏱", o.id + " (" + o.kunde + ") droht den Cut-off " + fmtTime(o.cutoff) + " zu reißen");
    } else if (!crit && state.critical.has(o.id)) {
      state.critical.delete(o.id); changed = true;
    }
  }
  return changed;
}
function pulse(o) { o._pulse = Date.now(); }
function pulseCls(o) { return (o._pulse && Date.now() - o._pulse < 2500) ? " pulse" : ""; }

    .sort((a,b) => rank[a.prioritaet] - rank[b.prioritaet] || a.cutoff - b.cutoff);

function pkHead() {
  const me = pickerById[ME];
  return '<div class="pk-head"><div class="pk-user"><div class="avatar">' + me.kuerzel + '</div>' +
    '<div><div style="font-weight:800;font-family:var(--font-head)">' + esc(me.name) + '</div>' +
    '<div class="pk-stats">Heute: ' + me.picksHeute + ' Picks · ' + pickerAcc(me).replace(".", ",") + ' %</div></div>' +
    '<span class="badge badge-green" style="margin-left:auto">aktiv</span></div></div>';
}
function renderPicker() {
  let body = "", footer = "", overlay = "";
  const s = state.session;

  if (!s) {
    /* ---- Auftrag holen ---- */
    const list = myOrders();
    body = '<div class="section-title">Auftrag holen</div>' +
      (list.length ? list.map(o =>
        '<button class="pk-order-item slide-in' + pulseCls(o) + '" data-onclick="takeOrder(\'' + o.id + '\')">' +
        '<div class="oi-row"><span class="oi-id">' + o.id + '</span>' + prioBadge(o) + '</div>' +
        '<div class="oi-sub">' + esc(o.kunde) + ' · ' + o.positionen.length + ' Positionen · ' + tourById[o.tour].name + '</div>' +
        '<div class="oi-cut" style="color:' + (state.critical.has(o.id) ? "var(--red)" : "var(--text2)") + '">Cut-off ' +
        fmtTime(o.cutoff) + ' · noch <span data-cutoff="' + o.cutoff.getTime() + '">' + fmtCountdown(o.cutoff - new Date()) + '</span>' +
        (o.picker === ME ? ' · <b>dir zugewiesen</b>' : "") + '</div></button>').join("")
      : '<div class="empty"><b>🎉</b>Keine offenen Aufträge – gut gemacht!</div>');
  } else {
    const o = orderById(s.orderId);
    if (s.phase === "summary") {
      /* ---- Zusammenfassung ---- */
      const teil = o.positionen.filter(p => p.status === "teilpick").length;
      const prob = o.positionen.filter(p => p.status === "problem").length;
      const dur = Math.max(1, Math.round((Date.now() - s.startedAt) / 60000));
      body = '<div class="summary-card slide-in"><div class="sc-ico">📦</div>' +
        '<h2>' + o.id + ' fertig kommissioniert</h2>' +
        '<div class="summary-grid">' +
        '<div class="sg"><b>' + o.positionen.length + '</b><span>Positionen</span></div>' +
        '<div class="sg"><b style="color:' + (teil+prob ? "var(--amber)" : "var(--green)") + '">' + (teil + prob) + '</b><span>Teil/Problem</span></div>' +
        '<div class="sg"><b>' + dur + ' min</b><span>Dauer</span></div></div>' +
        '<button class="btn-big btn-scan" data-onclick="handOver()">AN PACKPLATZ ÜBERGEBEN →</button></div>';
    } else {
      const pos = o.positionen[s.queue[0]];
      const art = artById[pos.artikelId];
      const revisit = pos._problemOnce ? '<div class="teil-hint">⚠ Zurückgestellte Position – erneut versuchen oder endgültig melden</div>' : "";
      if (s.phase === "scan") {
        /* ---- Scan-Bestätigung ---- */
        body = revisit +
          '<div style="text-align:center"><div class="section-title" style="margin-bottom:2px">Gehe zu Lagerplatz</div>' +
          '<div class="loc-code">' + locCode(art.lagerplatz) + '</div>' +
          '<div class="loc-sub"><span class="badge badge-blue mono">Gang ' + art.lagerplatz.gang +
          '</span><span class="badge badge-blue mono">Regal ' + art.lagerplatz.regal +
          '</span><span class="badge badge-blue mono">Boden ' + art.lagerplatz.boden + '</span></div></div>' +
          '<div class="pk-art' + (s.flash ? " flash-green" : "") + '"><div class="art-emoji">' + katEmoji(art.kategorie) + '</div>' +
          '<div class="art-name">' + esc(art.name) + '</div>' +
          '<div class="art-nr">Art.-Nr. ' + art.artikelnummer + ' · ' + art.kategorie + '</div>' +
          '<div class="pk-qty">× ' + pos.sollMenge + ' <small>Stück</small></div></div>' +
          '<div class="scan-box"><input id="scanInput" class="mono" inputmode="numeric" placeholder="Barcode scannen…" ' +
          'data-onkeydown="if(event.key===\'Enter\'){doScan(this.value);}" autocomplete="off"></div>' +
          (config.scanSimButton ? '<button class="btn-big btn-scan" data-onclick="doScan(\'' + art.artikelnummer + '\')">SCAN SIMULIEREN ✓</button>' : "") +
          '<button class="btn-big btn-problem" data-onclick="openProblem()">⚠ Problem melden</button>';
      } else if (s.phase === "qty") {
        /* ---- Menge bestätigen ---- */
        const knapp = art.bestand < pos.sollMenge;
        body = '<div style="text-align:center"><div class="section-title" style="margin-bottom:2px">Menge bestätigen</div>' +
          '<div class="loc-code" style="font-size:34px">' + locCode(art.lagerplatz) + '</div></div>' +
          '<div class="pk-art flash-green"><div class="art-emoji">' + katEmoji(art.kategorie) + '</div>' +
          '<div class="art-name">' + esc(art.name) + '</div>' +
          '<div class="art-nr">✓ Artikel korrekt gescannt</div></div>' +
          (knapp ? '<div class="teil-hint">Nur noch ' + art.bestand + ' am Lagerplatz – Teilmenge möglich</div>' : "") +
          '<div class="stepper"><button data-onclick="qtyStep(-1)">−</button>' +
          '<span class="st-val">' + state.qty + '</span>' +
          '<button data-onclick="qtyStep(1)">+</button></div>' +
          '<div style="text-align:center;font-size:12.5px;color:var(--text2)">Soll: <b class="mono">' + pos.sollMenge + '</b>' +
          (state.qty < pos.sollMenge ? ' · wird als <b style="color:var(--amber)">Teilpick</b> gebucht' : "") + '</div>' +
          '<button class="btn-big btn-scan" data-onclick="confirmQty()">MENGE BESTÄTIGEN ✓</button>' +
          '<button class="btn-big btn-problem" data-onclick="openProblem()">⚠ Problem melden</button>';
      }
      /* Fortschritt + Fehlscan-Overlay */
      const done = doneCount(o), total = o.positionen.length;
      footer = '<div class="pk-progress"><div style="display:flex;justify-content:space-between;margin-bottom:5px">' +
        '<span class="mono">' + o.id + '</span><span class="mono">' + done + ' / ' + total + ' Positionen</span></div>' +
        '<div class="progress"><i style="width:' + Math.round(done / total * 100) + '%"></i></div></div>';
      if (s.wrongScan) {
        overlay = '<div class="overlay-wrong"><div class="ow-ico">🔇⚠️</div><h2>STOPP – falscher Artikel!</h2>' +
          '<div class="ow-codes">Erwartet: <b>' + art.artikelnummer + '</b><br>Gescannt: <b>' + esc(s.wrongScan) + '</b></div>' +
          '<p style="font-size:13px;opacity:.9">Lege den Artikel zurück und greife den richtigen.</p>' +
          '<button data-onclick="closeWrong()">← ZURÜCK ZUM PICK</button></div>';
      }
    }
  }
  $("#view-picker").innerHTML =
    '<div class="device-wrap"><div class="device"><div class="device-notch"></div>' +
    '<div class="screen">' + pkHead() + '<div class="pk-body">' + body + '</div>' + footer + overlay + '</div></div></div>';
  const inp = $("#scanInput");
  if (inp && !state.session?.wrongScan) inp.focus(); /* Fokus bleibt im Scan-Feld – wie am echten Scanner */
  if (state.session) state.session.flash = false;
}

/* ---- Picker-Aktionen ---- */
function takeOrder(orderId) {
  const o = orderById(orderId);
  o.picker = ME; o.status = "inKommissionierung"; o.zeiten.gestartet = new Date();
  pulse(o);
  const queue = routeSort(o.positionen.map((p, i) => p.status === "offen" ? i : -1).filter(i => i >= 0), o);
  state.session = { orderId, queue, phase:"scan", startedAt: Date.now(), wrongScan:null, flash:false };
  addLog(pickerById[ME].name + " hat " + o.id + " übernommen");
  render();
}
function doScan(value) {
  const s = state.session; if (!s || s.phase !== "scan") return;
  const o = orderById(s.orderId);
  const pos = o.positionen[s.queue[0]];
  const art = artById[pos.artikelId];
  const v = String(value).trim();
  if (!v) return;
  state.scansTotal++;
  if (v === art.artikelnummer) {
    state.scansOk++;
    s.phase = "qty"; s.flash = true;
    /* Vorbefüllt mit Soll-Menge, aber nie mehr als tatsächlich am Platz liegt */
    state.qty = Math.max(0, Math.min(pos.sollMenge, art.bestand));
  } else {
    pickerById[ME].fehlerHeute++;
    s.wrongScan = v;
    addLog("❌ Fehlscan bei " + o.id + ": erwartet " + art.artikelnummer + ", gescannt " + v);
  }
  render();
}
function closeWrong() { state.session.wrongScan = null; render(); }
function qtyStep(d) {
  const s = state.session; const pos = orderById(s.orderId).positionen[s.queue[0]];
  const max = config.ueberpicken ? 999 : pos.sollMenge;   // Überpicken nur wenn erlaubt
  state.qty = Math.min(max, Math.max(0, state.qty + d));
  render();
}
function confirmQty() {
  const s = state.session; const o = orderById(s.orderId);
  const pos = o.positionen[s.queue[0]];
  const art = artById[pos.artikelId];
  pos.istMenge = state.qty;
  pos.status = state.qty < pos.sollMenge ? "teilpick" : "gepickt";
  /* Bestand reduzieren + Mindestbestand prüfen */
  const vorher = art.bestand;
  art.bestand = Math.max(0, art.bestand - state.qty);
  if (vorher >= art.mindestbestand && art.bestand < art.mindestbestand)
    addWarning("amber","📦", art.name + " (" + art.artikelnummer + "): Bestand " + art.bestand +
               " unter Mindestbestand " + art.mindestbestand);
  pickerById[ME].picksHeute++;
  if (pos.status === "teilpick")
    addLog("Teilpick bei " + o.id + ": " + art.name + " " + state.qty + "/" + pos.sollMenge);
  s.queue.shift();
  s.phase = s.queue.length ? "scan" : "summary";
  pulse(o);
  render();
}
/* ---- Problem melden ---- */
function openProblem() {
  $("#modalRoot").innerHTML = '<div class="modal-back" data-onclick="if(event.target===this)closeModal()">' +
    '<div class="modal"><h3>⚠ Problem melden</h3><p>Die Position wird übersprungen und ans Ende gestellt. Der Leitstand wird sofort informiert.</p>' +
    ['Lagerplatz leer','Ware beschädigt','Artikel nicht auffindbar'].map(t =>
      '<button class="prob-btn" data-onclick="reportProblem(\'' + t + '\')">' + t + '</button>').join("") +
    '<button class="cancel" data-onclick="closeModal()">Abbrechen</button></div></div>';
}
function closeModal() { $("#modalRoot").innerHTML = ""; }
function reportProblem(typ) {
  closeModal();
  const s = state.session; const o = orderById(s.orderId);
  const idx = s.queue[0];
  const pos = o.positionen[idx];
  const art = artById[pos.artikelId];
  addWarning("red","⚠", locCode(art.lagerplatz) + ": " + typ + " gemeldet (" + art.name + ", " + o.id + ")");
  if (!pos._problemOnce) {
    /* Erstes Mal: ans Ende stellen */
    pos._problemOnce = true;
    s.queue.shift(); s.queue.push(idx);
  } else {
    /* Zweites Mal: endgültig als Problem buchen */
    pos.status = "problem"; pos.istMenge = 0;
    s.queue.shift();
  }
  s.phase = s.queue.length ? "scan" : "summary";
  pulse(o);
  render();
}
function handOver() {
  const s = state.session; const o = orderById(s.orderId);
  o.status = "amPackplatz"; o.zeiten.fertig = new Date();
  pulse(o);
  addLog(o.id + " an Packplatz übergeben (" + pickerById[ME].name + ")");
  state.session = null;
  render();
}

/* ============================================================
   C) PACKPLATZ / VERLADUNG
   ============================================================ */

function renderPackplatz() {
  /* Warteschlange: vom Picker übergebene Aufträge, nach Cut-off sortiert */
  const queue = orders.filter(o => o.status === "amPackplatz").sort((a,b) => a.cutoff - b.cutoff);
  const packHTML = queue.length ? queue.map(o => {
    const allChecked = !config.kontrollzaehlung || o.positionen.every(p => p.kontrolle || p.status === "problem");
    const ready = allChecked && o.packstueck;
    return '<div class="card pack-card slide-in' + pulseCls(o) + '" id="pack-' + o.id + '">' +
      '<div class="pc-head"><span class="pc-id">' + o.id + '</span>' + prioBadge(o) +
      '<span class="badge badge-blue mono">Cut-off ' + fmtTime(o.cutoff) + '</span></div>' +
      '<div class="pc-kunde">' + esc(o.kunde) + ' · ' + tourById[o.tour].name +
      (o.picker ? ' · gepickt von ' + esc(pickerById[o.picker].name) : "") + '</div>' +
      o.positionen.map((p, i) => {
        const a = artById[p.artikelId];
        if (p.status === "problem")
          return '<div class="check-row" style="opacity:.55"><div class="cb">–</div>' +
            '<span class="cr-name">' + esc(a.name) + '</span><span class="badge badge-red cr-teil">Problem – fehlt</span></div>';
        return '<div class="check-row' + (p.kontrolle ? " checked" : "") + '" data-onclick="togglePos(\'' + o.id + '\',' + i + ')">' +
          '<div class="cb">' + (p.kontrolle ? "✓" : "") + '</div>' +
          '<span class="cr-name">' + esc(a.name) + ' <span class="mono" style="font-size:11px;color:var(--text2)">' + a.artikelnummer + '</span></span>' +
          (p.status === "teilpick" ? '<span class="badge badge-amber cr-teil">Teilpick</span>' : "") +
          '<span class="cr-qty">× ' + p.istMenge + '</span></div>';
      }).join("") +
      '<div class="pack-select">' + config.packstuecke.map(ps =>
        '<button class="' + (o.packstueck === ps ? "sel" : "") + '" data-onclick="setPack(\'' + o.id + '\',\'' + ps + '\')">' + ps + '</button>').join("") + '</div>' +
      '<button class="pill pill-primary" style="width:100%;padding:13px" ' + (ready ? "" : "disabled") +
      ' data-onclick="packOrder(\'' + o.id + '\')">VERPACKT ✓</button>' +
      (!ready ? '<div style="font-size:11.5px;color:var(--text2);text-align:center;margin-top:7px">Erst alle Positionen abhaken und Packstück wählen</div>' : "") +
      '</div>';
  }).join("") : '<div class="empty"><b>🎉</b>Warteschlange leer – nichts zu packen!</div>';

  /* Verlade-Modus: gepackte Aufträge gruppiert nach Tour */
  const loadHTML = touren.map(t => {
    const inTour = orders.filter(o => o.tour === t.id && (o.status === "gepackt" || o.status === "verladen"));
    const gepackt = inTour.filter(o => o.status === "gepackt");
    const allOfTour = orders.filter(o => o.tour === t.id);
    const complete = allOfTour.length > 0 && allOfTour.every(o => o.status === "verladen");
    let rows;
    if (complete) {
      rows = '<div class="tour-done">✓ ' + t.name + ' komplett – ' + allOfTour.length + '/' + allOfTour.length + ' Aufträge verladen</div>';
    } else if (gepackt.length) {
      rows = gepackt.sort((a,b) => a.cutoff - b.cutoff).map(o =>
        '<div class="load-row slide-in' + pulseCls(o) + '" id="load-' + o.id + '">' +
        '<div class="lr-info"><div class="lr-id">' + o.id + '</div>' +
        '<div class="lr-sub">' + esc(o.kunde) + ' · ' + (o.packstueck || "–") + ' · Cut-off ' + fmtTime(o.cutoff) + '</div></div>' +
        '<button class="pill pill-green" data-onclick="loadOrder(\'' + o.id + '\')">AUF LKW VERLADEN 🚚</button></div>').join("");
    } else {
      rows = '<div class="empty" style="padding:16px">Noch nichts Gepacktes für diese Tour</div>';
    }
    const verladen = inTour.filter(o => o.status === "verladen").length;
    return '<div class="tour-group"><div class="tour-head"><span class="th-name">🚚 ' + t.name +
      ' · Abfahrt ' + fmtTime(t.abfahrt) + '</span><span class="mono">noch <span data-cutoff="' +
      t.abfahrt.getTime() + '">' + fmtCountdown(t.abfahrt - new Date()) + '</span> · ' +
      verladen + '/' + allOfTour.length + ' verladen</span></div>' + rows + '</div>';
  }).join("");

  $("#view-packplatz").innerHTML =
    '<div class="pack-grid">' +
    '<div><div class="section-title">Packen – Warteschlange (' + queue.length + ')</div>' + packHTML + '</div>' +
    '<div><div class="section-title">Verladung nach Tour</div>' + loadHTML + '</div></div>';
}
/* ---- Packplatz-Aktionen ---- */
function togglePos(orderId, i) {
  const p = orderById(orderId).positionen[i];
  p.kontrolle = !p.kontrolle;
  render();
}
function setPack(orderId, ps) { orderById(orderId).packstueck = ps; render(); }
function packOrder(orderId) {
  const o = orderById(orderId);
  o.status = "gepackt"; pulse(o);
  addLog(o.id + " verpackt (" + o.packstueck + ")");
  render();
}
function loadOrder(orderId) {
  const o = orderById(orderId);
  const el = document.getElementById("load-" + orderId);
  addLog(o.id + " auf LKW verladen (" + tourById[o.tour].name + ")");
  o.status = "verladen"; pulse(o);
  if (el) { el.classList.add("fly-out"); setTimeout(render, 480); } else render();
}


/* ============================================================
   D) VERWALTUNG – der Betrieb stellt hier alles selbst ein.
   Übersichtliche Karten-Listen, große Touch-Flächen, eigene
   Dialoge (keine Browser-Popups – die sind in vielen Umgebungen
   blockiert und funktionieren auf Touch-Geräten schlecht).
   ============================================================ */
let idSeq = 100;                 // Laufende Nummer für neue Datensätze
let _confirmFn = null;           // Callback für den Bestätigungs-Dialog
let _inputFn = null;             // Callback für den Eingabe-Dialog
const ADMIN_TABS = [
  ["artikel","📦 Artikel"], ["auftraege","📋 Aufträge"], ["personal","👥 Personal"],
  ["zugaenge","🔑 Zugänge"], ["touren","🚚 Touren"], ["stammdaten","🏷 Kategorien"],
  ["regeln","🎨 Aussehen & Regeln"],
];
function setAdminTab(t) { state.adminTab = t; render(); }
function artikelInVerwendung(artId) {
  return orders.some(o => o.positionen.some(p => p.artikelId === artId));
}
function renderAdmin() {
  const tab = state.adminTab || "artikel";
  const intro = '<div class="admin-hero">' +
    '<h2>Verwaltung – hier stellst du alles selbst ein</h2>' +
    '<p>Wähle unten einen Bereich. Zum Bearbeiten tippst du auf einer Karte auf „✏️ Bearbeiten”, mit ＋ legst du Neues an. ' +
    'Unter „🎨 Aussehen & Regeln” änderst du Farbe, Firmenname und alle Abläufe. Jede Änderung ist sofort überall sichtbar.</p></div>';
  const tabs = '<div class="admin-tabs">' + ADMIN_TABS.map(([k, l]) =>
    '<button class="admin-tab' + (k === tab ? " active" : "") + '" data-onclick="setAdminTab(\'' + k + '\')">' + l + '</button>').join("") + '</div>';
  let body = "";
  if (tab === "artikel")    body = adminArtikel();
  if (tab === "auftraege")  body = adminAuftraege();
  if (tab === "personal")   body = adminPersonal();
  if (tab === "zugaenge")   body = adminZugaenge();
  if (tab === "touren")     body = adminTouren();
  if (tab === "stammdaten") body = adminStammdaten();
  if (tab === "regeln")     body = adminRegeln();
  $("#view-admin").innerHTML = intro + tabs + body;
}

/* ---------- Eigene Dialoge (Ersatz für alert / confirm / prompt) ---------- */
function showErr(msg) {
  const e = document.getElementById("formErr");
  if (e) { e.textContent = msg; e.style.display = "block"; }
}
function askConfirm(text, fn) {
  _confirmFn = fn;
  $("#modalRoot").innerHTML = '<div class="modal-back" data-onclick="if(event.target===this)closeModal()"><div class="modal">' +
    '<h3>Bist du sicher?</h3><div class="confirm-txt">' + text + '</div>' +
    '<button class="btn-danger-big" data-onclick="modalConfirmYes()">JA, LÖSCHEN</button>' +
    '<button class="cancel" data-onclick="closeModal()">Abbrechen</button></div></div>';
}
function modalConfirmYes() { const f = _confirmFn; _confirmFn = null; closeModal(); if (f) f(); }
function askInput(title, hint, placeholder, fn) {
  _inputFn = fn;
  $("#modalRoot").innerHTML = '<div class="modal-back" data-onclick="if(event.target===this)closeModal()"><div class="modal">' +
    '<h3>' + title + '</h3><p>' + hint + '</p><div class="form-err" id="formErr"></div>' +
    '<input class="inp" id="inpVal" placeholder="' + esc(placeholder) + '" style="margin-bottom:12px"' +
    ' data-onkeydown="if(event.key===\'Enter\')modalInputSave()">' +
    '<button class="btn-big btn-scan" data-onclick="modalInputSave()">SPEICHERN ✓</button>' +
    '<button class="cancel" data-onclick="closeModal()">Abbrechen</button></div></div>';
  const i = document.getElementById("inpVal"); if (i) i.focus();
}
function modalInputSave() {
  const v = document.getElementById("inpVal").value.trim();
  if (!v) { showErr("Bitte etwas eingeben."); return; }
  const f = _inputFn; _inputFn = null; closeModal(); if (f) f(v);
}

/* ---------- Artikel ---------- */
function adminArtikel() {
  const list = artikel.slice().sort((a,b) => a.name.localeCompare(b.name)).map(a => {
    const low = a.bestand < a.mindestbestand;
    const used = artikelInVerwendung(a.id);
    return '<div class="item-card art-item" data-search="' + esc((a.name + " " + a.artikelnummer + " " + a.kategorie).toLowerCase()) + '">' +
      '<div class="ic-head"><div class="ic-emoji">' + katEmoji(a.kategorie) + '</div>' +
      '<div class="ic-title">' + esc(a.name) +
      '<div class="ic-sub">Art.-Nr. <span class="mono">' + a.artikelnummer + '</span> · ' + esc(a.kategorie) + '</div></div>' +
      (low ? '<span class="badge badge-amber">Bestand niedrig</span>' : "") + '</div>' +
      '<div class="ic-chips"><span class="badge badge-blue mono">📍 ' + locCode(a.lagerplatz) + '</span>' +
      '<span class="badge badge-blue mono">min. ' + a.mindestbestand + '</span>' +
      '<span class="badge badge-blue mono">' + a.gewicht + ' kg</span></div>' +
      '<div class="ic-actions"><span class="stock-big"><button data-onclick="stockAdj(\'' + a.id + '\',-1)">−</button>' +
      '<b class="' + (low ? "low" : "") + '">' + a.bestand + '</b>' +
      '<button data-onclick="stockAdj(\'' + a.id + '\',1)">+</button><span class="sb-label">Bestand</span></span>' +
      '<button class="btn-sm btn-edit" data-onclick="openArtikelForm(\'' + a.id + '\')">✏️ Bearbeiten</button>' +
      '<button class="btn-sm btn-del" ' + (used ? 'disabled title="In Aufträgen enthalten"' : "") +
      ' data-onclick="deleteArtikel(\'' + a.id + '\')">Löschen</button></div></div>';
  }).join("");
  return '<div class="help-note">💡 <b>Artikel-Stammdaten.</b> Bestand direkt mit − / + korrigieren. ' +

function fld(label, id, type, val, cls) {

}
function V(id) { return document.getElementById(id).value.trim(); }
function saveArtikel(id) {
  const nr = V("f_nr");
  if (!/^\d{4}$/.test(nr)) { showErr("Die Artikelnummer muss genau 4 Ziffern haben (z. B. 4711)."); return; }
  const dupe = artikel.find(a => a.artikelnummer === nr && a.id !== id);
  if (dupe) { showErr("Artikelnummer " + nr + " ist bereits vergeben („" + dupe.name + "”)."); return; }
  if (!V("f_name")) { showErr("Bitte einen Artikelnamen eingeben."); return; }
  const a = id ? artById[id] : A("a" + (++idSeq), nr, "", "", 1,1,1, 0,0,0);
  if (!id) artikel.push(a);
  a.artikelnummer = nr; a.name = V("f_name");
  a.kategorie = document.getElementById("f_kat").value;
  a.lagerplatz = { gang:+V("f_gang")||1, regal:+V("f_regal")||1, boden:+V("f_boden")||1 };
  a.gewicht = +V("f_gew")||0; a.mindestbestand = +V("f_mind")||0;
  const vorher = a.bestand; a.bestand = +V("f_best")||0;
  if (a.bestand < a.mindestbestand && (id ? vorher >= a.mindestbestand : true))
    addWarning("amber","📦", a.name + " (" + a.artikelnummer + "): Bestand " + a.bestand + " unter Mindestbestand " + a.mindestbestand);
  addLog((id ? "Artikel geändert: " : "Neuer Artikel angelegt: ") + a.name + " (" + a.artikelnummer + ")");
  closeModal(); render();
}
function deleteArtikel(id) {

  askConfirm('Artikel <b>„' + esc(a.name) + '”</b> (' + a.artikelnummer + ') endgültig löschen?', () => {
    artikel.splice(artikel.indexOf(a), 1);

    render();
  });
}

function renderTmpPos() {
  const el = document.getElementById("posList"); if (!el) return;

    const a = artById[p.artikelId];
    return '<div class="pos-line"><span style="flex:1;min-width:0">' + katEmoji(a.kategorie) + ' ' + esc(a.name) + '</span>' +

      '<button data-onclick="tmpPosQty(' + i + ',1)">+</button></span>' +

  }).join("") : '<div style="font-size:12.5px;color:var(--text2);padding:6px 2px">Noch keine Position – unten Artikel wählen und „＋ hinzufügen” tippen.</div>';
}
function tmpPosQty(i, d) {
  const p = state.tmpPos[i]; p.sollMenge = Math.max(1, p.sollMenge + d);
  renderTmpPos();
}
function tmpPosAdd() {
  const artId = document.getElementById("f_art").value;
  const ex = state.tmpPos.find(p => p.artikelId === artId);
  if (ex) ex.sollMenge += 1; else state.tmpPos.push({ artikelId: artId, sollMenge: 1 });
  renderTmpPos();   // neue Zeile mit − / + Steppern erscheint sofort
}
function tmpPosDel(i) { state.tmpPos.splice(i, 1); renderTmpPos(); }
function timeToday(hhmm) {
  const [h, m] = hhmm.split(":").map(Number);
  const d = new Date(); d.setHours(h, m, 0, 0); return d;
}
function saveOrder(id) {
  if (!V("f_kunde")) { showErr("Bitte einen Kunden eingeben."); return; }
  if (!state.tmpPos.length) { showErr("Bitte mindestens einen Artikel hinzufügen (unten wählen, dann „＋ hinzufügen”)."); return; }
  let o = id ? orderById(id) : null;
  if (!o) {
    const maxNr = Math.max(...orders.map(x => +x.id.slice(2)), 2299);
    o = O("A-" + (maxNr + 1), "", "normal", 60, touren[0].id, [], "offen", null);
    orders.push(o);
  }
  o.kunde = V("f_kunde");
  const pv = document.getElementById("f_prio").value;
  o.prioritaet = ["normal","eilig","express"].includes(pv) ? pv : "normal";
  o.cutoff = timeToday(document.getElementById("f_cut").value || fmtTime(inMin(60)));
  const tv = document.getElementById("f_tour").value;
  o.tour = tourById[tv] ? tv : touren[0].id;   // Fallback, falls Tour ungültig
  o.positionen = state.tmpPos.map(p => P(p.artikelId, p.sollMenge));
  pulse(o);
  addLog((id ? "Auftrag geändert: " : "Neuer Auftrag angelegt: ") + o.id + " (" + o.kunde + ", " + o.positionen.length + " Positionen)");
  closeModal(); render();
}
function stornoOrder(id) {
  const o = orderById(id);
  if (o.status !== "offen") return;
  askConfirm('Auftrag <b>' + o.id + '</b> (' + esc(o.kunde) + ') wirklich stornieren?', () => {
    orders.splice(orders.indexOf(o), 1);
    state.critical.delete(o.id);
    addLog("Auftrag storniert: " + o.id + " (" + o.kunde + ")");
    render();
  });
}

        (locked ? ' title="Mindestens ein Konto braucht Verwaltung" style="opacity:.6"' :
        ' data-onclick="accPerm(\'' + a.id + '\',\'' + f.id + '\')"') + '>' +
        '<span class="pc-box">' + (on ? "✓" : "") + '</span>' + f.ico + ' ' + f.label + '</label>';

      '<div class="ic-title"><input class="inp" type="text" value="' + esc(a.name) + '" data-onchange="accSet(\'' + a.id + '\',\'name\',this.value)">' +
      (isMe ? '<span class="badge badge-green" style="margin-top:5px;display:inline-flex">Du bist gerade angemeldet</span>' : "") + '</div></div>' +
      '<div class="form-grid" style="margin-top:11px;margin-bottom:0">' +
      '<div class="field"><label>Benutzername</label><input value="' + esc(a.user) + '" data-onchange="accSet(\'' + a.id + '\',\'user\',this.value)"></div>' +
      '<div class="field"><label>Passwort</label><input value="' + esc(a.pass) + '" data-onchange="accSet(\'' + a.id + '\',\'pass\',this.value)"></div></div>' +
      '<div style="margin-top:11px"><span style="font-size:12px;font-weight:700;color:var(--text2)">Darf sehen:</span>' +
      '<div class="perm-grid">' + permChips + '</div></div>' + pickerSel +
      '<div class="ic-actions"><button class="btn-sm btn-del" ' + (isMe || lastAdmin ? "disabled" : "") +
      ' data-onclick="deleteAccount(\'' + a.id + '\')">Konto löschen</button>' +
      (isMe ? '<span style="font-size:11.5px;color:var(--text2)">eigenes Konto nicht löschbar</span>' :
       lastAdmin ? '<span style="font-size:11.5px;color:var(--text2)">letztes Leitungs-Konto</span>' : "") +
      '</div></div>';
  }).join("");
  return '<div class="help-note">💡 <b>Zugänge.</b> Jedes Konto meldet sich mit Benutzername + Passwort an und ' +
    'sieht <b>nur die angehakten Bereiche</b>. Verknüpfst du ein Picker-Konto mit einem Mitarbeiter, laufen dessen ' +
    'Picks auf diesen Namen. Änderungen gelten ab der nächsten Anmeldung des Kontos.</div>' +
    '<div style="margin-bottom:12px"><button class="pill pill-primary" data-onclick="addAccount()" style="padding:12px 22px">＋ Neues Konto</button></div>' + list;
}
function accSet(id, key, val) {
  const a = accounts.find(x => x.id === id);
  val = String(val).trim();
  if (key !== "pickerId" && !val) return render();
  if (key === "user") {
    const dupe = accounts.find(x => x.user.toLowerCase() === val.toLowerCase() && x.id !== id);
    if (dupe) { render(); return; }
    val = val.toLowerCase();
  }
  a[key] = key === "pickerId" ? (val || null) : val;
  if (key === "pickerId" && state.currentUser && state.currentUser.id === id) ME = a.pickerId || "p3";
  addLog("Konto geändert: " + a.name + " (" + key + ")");
  render();
}
function accPerm(id, feat) {
  const a = accounts.find(x => x.id === id);
  const on = a.perms.includes(feat);
  if (on && feat === "admin" && adminCount() === 1) return;   // nicht aussperren
  if (on) a.perms = a.perms.filter(p => p !== feat);
  else a.perms.push(feat);
  addLog("Rechte geändert: " + a.name + " – " + feat + (on ? " entzogen" : " erteilt"));
  /* Eigene Rechte sofort anwenden */
  if (state.currentUser && state.currentUser.id === id) {
    if (!hasPerm(state.role)) setRole(a.perms[0] || "leitstand");
  }
  render();
}
function addAccount() {
  askInput("Neues Konto", "Anzeigename der Person oder Station (z. B. „Maria S.” oder „Tablet Halle 2”). Benutzername und Passwort stellst du danach direkt auf der Karte ein.", "Name", name => {
    const user = name.toLowerCase().replace(/[^a-z0-9]/g, "").slice(0, 12) || ("konto" + (idSeq + 1));
    accounts.push({ id:"acc" + (++idSeq), user, pass:"1234", name, pickerId:null, perms:["picker"] });
    addLog("Konto angelegt: " + name + " (Benutzer: " + user + ", Passwort: 1234)");
    render();
  });
}
function deleteAccount(id) {
  const a = accounts.find(x => x.id === id);
  if (state.currentUser && state.currentUser.id === id) return;
  if (a.perms.includes("admin") && adminCount() === 1) return;
  askConfirm('Konto <b>„' + esc(a.name) + '”</b> (Benutzer: ' + a.user + ') wirklich löschen?', () => {
    accounts.splice(accounts.indexOf(a), 1);
    addLog("Konto gelöscht: " + a.name);
    render();
  });

/* ============================================================
   UHR & LIVE-COUNTDOWNS (jede Sekunde, ohne Voll-Rerender –
   so behält das Scan-Feld den Fokus)
   ============================================================ */
function tick() {
  const now = new Date();
  $("#clockTime").textContent = fmtTimeS(now);
  document.querySelectorAll("[data-cutoff]").forEach(el => {
    el.textContent = fmtCountdown(Number(el.dataset.cutoff) - now.getTime());
  });
  /* Cut-off-Risiken neu bewerten – bei Änderung Warnung + Rerender */
  if (checkCriticals()) render();
}
setInterval(tick, 1000);

  const iu = document.getElementById("loginUser"), ip = document.getElementById("loginPass");
  if (iu) iu.value = u; if (ip) ip.value = p;
}
function doLogin() {
  const u = (document.getElementById("loginUser").value || "").trim().toLowerCase();
  const p = document.getElementById("loginPass").value || "";
  const acc = accounts.find(a => a.user.toLowerCase() === u && a.pass === p);
  if (!acc) { showErr("Benutzername oder Passwort falsch. Tipp: eines der Demo-Konten unten antippen."); return; }
  if (!acc.perms.length) { showErr("Dieses Konto hat keine freigeschalteten Bereiche. Bitte an die Leitung wenden."); return; }
  state.currentUser = acc;
  ME = acc.pickerId || "p3";                     // verknüpfter Picker wird die aktive Person
  $("#loginRoot").innerHTML = "";
  addLog(acc.name + " hat sich angemeldet");
  setRole(acc.perms.includes("leitstand") ? "leitstand" : acc.perms[0]);
}
function logout() {
  if (state.currentUser) addLog(state.currentUser.name + " hat sich abgemeldet");
  state.currentUser = null;
  state.session = null;                          // laufende Pick-Session beenden
  updateAccess();
  renderLogin();
}

/* ============================================================
   EVENT-DELEGATION (robust gegen Sandboxes, die inline-onclick
   blockieren): Ein zentraler Dispatcher liest data-on*-Attribute
   und ruft die zugehörige globale Funktion mit den Argumenten auf.
   ============================================================ */
function _splitArgs(s) {                 // Argumente an Top-Level-Kommas trennen (Anführungszeichen respektieren)
  const out = []; let cur = "", q = null;
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (q) { cur += c; if (c === q) q = null; }
    else if (c === "'" || c === '"') { q = c; cur += c; }
    else if (c === ",") { out.push(cur); cur = ""; }
    else cur += c;
  }
  if (cur.trim() !== "") out.push(cur);
  return out;
}
function _evalArg(a, el) {                // Einzelnes Argument auswerten
  a = a.trim();
  if (a === "null") return null;
  if (a === "true") return true;
  if (a === "false") return false;
  if (/^-?\d+(\.\d+)?$/.test(a)) return Number(a);
  if (a === "this.value") return el.value;
  if (a === "+this.value") return Number(el.value);
  if (a === "this.checked") return el.checked;
  let m;
  if (m = a.match(/^this\.value\.trim\(\)\s*\|\|\s*'([^']*)'$/)) return el.value.trim() || m[1];
  if (m = a.match(/^'([\s\S]*)'$/)) return m[1].replace(/\\'/g, "'");
  if (m = a.match(/^"([\s\S]*)"$/)) return m[1].replace(/\\"/g, '"');
  return a;
}
function _runHandler(el, event, expr) {
  expr = expr.trim();
  let m;
  if (m = expr.match(/^if\(event\.key==='Enter'\)([\s\S]*)$/)) {   // Enter-Guard (Scan-Feld, Eingabe-Dialog)
    if (event.key !== "Enter") return;
    expr = m[1].trim();
    if (expr.startsWith("{") && expr.endsWith("}")) expr = expr.slice(1, -1).trim();
    expr = expr.replace(/;$/, "").trim();
  } else if (m = expr.match(/^if\(event\.target===this\)([\s\S]*)$/)) {  // Klick auf Modal-Hintergrund
    if (event.target !== el) return;
    expr = m[1].trim();
  }
  const call = expr.match(/^([A-Za-z_$][\w$]*)\(([\s\S]*)\)$/);
  if (!call) return;
  const fn = window[call[1]];
  if (typeof fn !== "function") { console.warn("Unbekannte Aktion:", call[1]); return; }
  const args = call[2].trim() === "" ? [] : _splitArgs(call[2]).map(a => _evalArg(a, el));
  fn.apply(el, args);
}
/* Ein Listener pro Event-Typ auf document – findet das nächste Element mit dem passenden data-on-Attribut */
["click","change","input","keydown"].forEach(type => {
  document.addEventListener(type, e => {
    const attr = "data-on" + type;
    let node = e.target;
    while (node && node.nodeType === 1) {
      if (node.hasAttribute && node.hasAttribute(attr)) { _runHandler(node, e, node.getAttribute(attr)); return; }
      node = node.parentNode;
    }
  });
});
